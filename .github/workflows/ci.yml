name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Validate module manifest
        shell: pwsh
        run: Test-ModuleManifest ./PowerPlatformAsyncDeploy.psd1

      - name: Import module and verify exports
        shell: pwsh
        run: |
          Import-Module ./PowerPlatformAsyncDeploy.psd1 -Force
          $expected = @('Start-PpAsyncDeployment', 'Get-PpAsyncDeploymentStatus')
          $actual   = (Get-Command -Module PowerPlatformAsyncDeploy).Name
          $missing  = $expected | Where-Object { $_ -notin $actual }
          if ($missing) { throw "Missing exported function(s): $($missing -join ', ')" }
          Write-Host "Exports OK: $($actual -join ', ')"

      - name: Lint with PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser -ErrorAction Stop
          $results = Invoke-ScriptAnalyzer -Path . -Recurse
          if ($results) { $results | Format-Table -AutoSize | Out-String | Write-Host }
          $errors = @($results | Where-Object { $_.Severity -eq 'Error' })
          if ($errors.Count) { throw "PSScriptAnalyzer reported $($errors.Count) error(s)." }
          Write-Host "Lint OK (no errors)."
